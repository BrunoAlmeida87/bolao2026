let resultBuf = {};
// side: 'h' | 'a' | 'ph' | 'pa'  (ph/pa = penaltis casa/fora)
function onResultInput(gameId, side, value) {
  const v = value===''?undefined:Math.max(0,Math.min(20,parseInt(value)||0));
  if (!resultBuf[gameId]) resultBuf[gameId] = {};
  resultBuf[gameId][side] = v;
  const inp = document.getElementById(`r${side}_${gameId}`);
  if (inp) inp.classList.remove('saved');
  // Mostra/esconde linha de penaltis ao vivo (empate em jogo eliminatório)
  if (_isElim(gameId)) _updatePenRowVisibility(gameId);
  if (saveDebounce['r_'+gameId]) clearTimeout(saveDebounce['r_'+gameId]);
  saveDebounce['r_'+gameId] = setTimeout(()=>saveResultado(gameId), 1000);
}

function _updatePenRowVisibility(gameId) {
  const hInp = document.getElementById(`rh_${gameId}`);
  const aInp = document.getElementById(`ra_${gameId}`);
  const penRow = document.getElementById(`pen_row_${gameId}`);
  if (!hInp || !aInp || !penRow) return;
  const hv = hInp.value, av = aInp.value;
  const both = hv !== '' && av !== '';
  const draw = both && parseInt(hv) === parseInt(av);
  penRow.style.display = draw ? 'grid' : 'none';
}

async function _cascadeAfterResult(_gameId) {
  // updateEliminationTeams já resolve todas as fases de forma progressiva
  return updateEliminationTeams();
}

async function saveResultado(gameId) {
  const buf = resultBuf[gameId];
  if (!buf) return;
  try {
    const FV = firebase.firestore.FieldValue;
    const patch = { updatedAt: FV.serverTimestamp() };
    if ('h'  in buf) patch.h_real = buf.h  === undefined ? FV.delete() : buf.h;
    if ('a'  in buf) patch.a_real = buf.a  === undefined ? FV.delete() : buf.a;
    if ('ph' in buf) patch.h_pen  = buf.ph === undefined ? FV.delete() : buf.ph;
    if ('pa' in buf) patch.a_pen  = buf.pa === undefined ? FV.delete() : buf.pa;
    // Em eliminatórias: se estado final deixou de ser empate, apaga penaltis obsoletos
    if (_isElim(gameId)) {
      const snap = await db_.collection('resultados').doc(gameId).get();
      const cur = snap.exists ? snap.data() : {};
      const finalH = 'h' in buf ? buf.h : cur.h_real;
      const finalA = 'a' in buf ? buf.a : cur.a_real;
      if (finalH !== undefined && finalA !== undefined && parseInt(finalH) !== parseInt(finalA)) {
        patch.h_pen = FV.delete();
        patch.a_pen = FV.delete();
      }
    }
    await db_.collection('resultados').doc(gameId).set(patch, {merge:true});
    delete resultBuf[gameId];
    ['h','a','ph','pa'].forEach(s=>{ const inp=document.getElementById(`r${s}_${gameId}`); if(inp) inp.classList.add('saved'); });
    showToast('✅ Resultado salvo','success');
    await _cascadeAfterResult(gameId);
    isLoadingPage = false;
  } catch(e) {
    showToast('Erro: '+e.message,'error');
    isLoadingPage = false;
  }
}

async function toggleLock(gameId) {
  try {
    const snap = await db_.collection('resultados').doc(gameId).get();
    const cur = snap.exists ? snap.data() : {};
    const newLocked = !cur.locked;
    await db_.collection('resultados').doc(gameId).set({ ...cur, locked:newLocked }, {merge:true});
    const btn = document.getElementById(`lock_${gameId}`);
    if (btn) { btn.textContent=newLocked?'🔒':'🔓'; btn.classList.toggle('locked',newLocked); }
    showToast(newLocked?'🔒 Jogo bloqueado':'🔓 Jogo desbloqueado', newLocked?'warning':'success');
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

// ════════════════════════════════════════════
// TEST-MODE:START — REMOVER EM PRODUÇÃO
// Ferramentas de admin para preencher/apagar resultados em massa
// (procure por "TEST-MODE" para localizar e remover todos os blocos)
// ════════════════════════════════════════════
function _isAdmin() { return currentUserDoc?.role === 'admin'; }
function _randScore() { return Math.floor(Math.random() * 5); } // 0–4

async function _testeApplyBatch(games, mode) {
  const FV = firebase.firestore.FieldValue;
  const batch = db_.batch();
  games.forEach(g => {
    const ref = db_.collection('resultados').doc(g.id);
    if (mode === 'fill') {
      const h = _randScore(), a = _randScore();
      const data = { h_real: h, a_real: a, updatedAt: FV.serverTimestamp() };
      if (_isElim(g.id) && h === a) {
        // Empate em eliminatória → gera penaltis distintos para decidir vencedor
        let hp = 3 + Math.floor(Math.random() * 3); // 3..5
        let ap = 3 + Math.floor(Math.random() * 3);
        if (ap === hp) ap = hp === 5 ? hp - 1 : hp + 1;
        data.h_pen = hp;
        data.a_pen = ap;
      } else {
        // Sem empate → limpa penaltis antigos
        data.h_pen = FV.delete();
        data.a_pen = FV.delete();
      }
      batch.set(ref, data, { merge: true });
    } else {
      batch.set(ref, {
        h_real: FV.delete(),
        a_real: FV.delete(),
        h_pen:  FV.delete(),
        a_pen:  FV.delete(),
        h_team: FV.delete(),
        a_team: FV.delete(),
        updatedAt: FV.serverTimestamp()
      }, { merge: true });
    }
  });
  await batch.commit();
}

async function _testeFinish(msg) {

  await renderAdminResultados();

}

// Limpa apenas os nomes das seleções (h_team/a_team) em todas as fases
// eliminatórias. Serve para "destravar" chaves que ficaram com seleções
// gravadas por fills antigos antes da correção de clear.
async function testeResetBracket() {
  if (!_isAdmin()) { showToast('Ação restrita a admin', 'error'); return; }
  if (!confirm('Resetar os nomes das seleções em TODAS as fases eliminatórias (oitavas → final)?\nPlacares não serão afetados.')) return;
  try {
    const FV = firebase.firestore.FieldValue;
    const batch = db_.batch();
    let count = 0;
    ['r32','r16','quartas','semi','final'].forEach(k => {
      ELIM_DATA[k].games.forEach(g => {
        batch.set(db_.collection('resultados').doc(g.id),
          { h_team: FV.delete(), a_team: FV.delete(), updatedAt: FV.serverTimestamp() },
          { merge: true });
        count++;
      });
    });
    await batch.commit();
    // Se grupos estão completos, reprocessa a cascata para repopular
    try { await updateEliminationTeams(); } catch(e) { console.error('resetBracket cascade:', e); }
    await renderAdminResultados();
    showToast(`🔄 Chave resetada (${count} jogos)`, 'success');

async function renderAdminUsuarios() {
  const cont = document.getElementById('admin-usuarios');
  if (!cont) return;
  cont.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const snap = await db_.collection('usuarios').get();
    const users = snap.docs.map(d=>({uid:d.id,...d.data()}));
    const activeUsers = users.filter(u=>u.ativo!==false);

    // Load palpites for all active users
    const palSnaps = await Promise.all(activeUsers.map(u=>db_.collection('palpites').doc(u.uid).collection('jogos').get()));
    const userPalCounts = {};
    activeUsers.forEach((u,i)=>{
      const filled = palSnaps[i].docs.filter(d=>{const p=d.data();return p.h!==undefined&&p.a!==undefined;}).length;
      userPalCounts[u.uid] = filled;
    });

    const total = ALL_GAMES.length;
    const incomplete = activeUsers.filter(u=>userPalCounts[u.uid]<total && u.email);
    const incompleteEmails = incomplete.map(u=>u.email).join(',');
    const bulkMailto = incompleteEmails ? `mailto:${incompleteEmails}?subject=${encodeURIComponent('[Bolão ICN] Palpites pendentes')}&body=${encodeURIComponent('Olá! Lembrete: você ainda tem palpites pendentes no Bolão ICN Copa 2026. Acesse e complete seus palpites antes dos jogos começarem!')}` : '';

    let html = `<div class="alert alert-info">${users.length} usuário(s) registrado(s) · ${activeUsers.length} ativo(s).</div>`;
    if (bulkMailto) {
      html += `<div style="margin-bottom:16px"><a href="${esc(bulkMailto)}" class="btn btn-primary btn-sm">📧 Email para todos com palpites incompletos (${incomplete.length})</a></div>`;
    }

    users.sort((a,b)=>{ if(a.role===b.role) return (a.apelido||'').localeCompare(b.apelido||''); return a.role==='admin'?-1:1; }).forEach(u=>{
      const isSelf = u.uid===currentUser.uid;
      const filled = userPalCounts[u.uid]??0;
      const pct = Math.round(filled/total*100);
      const isComplete = filled>=total;
      const statusBadge = u.ativo===false ? '' :
        isComplete
          ? `<span style="background:rgba(0,200,81,.15);color:var(--green);border:1px solid var(--green);border-radius:12px;padding:2px 8px;font-size:0.72rem;font-weight:700">✅ Em dia ${filled}/${total}</span>`
          : `<span style="background:rgba(255,140,0,.15);color:var(--orange);border:1px solid var(--orange);border-radius:12px;padding:2px 8px;font-size:0.72rem;font-weight:700">⚠️ ${filled}/${total}</span>`;
      const mailBody = `Olá ${u.apelido||u.nome}! Você ainda tem ${total-filled} palpite(s) pendente(s) no Bolão ICN Copa 2026. Acesse o sistema e complete seus palpites antes dos jogos começarem!`;
      const mailBtn = u.email && !isComplete && u.ativo!==false
        ? `<a href="mailto:${esc(u.email)}?subject=${encodeURIComponent('[Bolão ICN] Seus palpites estão incompletos')}&body=${encodeURIComponent(mailBody)}" class="btn btn-secondary btn-sm">📧 Lembrete</a>`
        : '';
      html += `<div class="user-row">
        <div class="user-info-col">
          <div class="user-name-big">${esc(u.apelido)} <span class="badge ${u.role==='admin'?'badge-admin-tag':'badge-user'}">${u.role}</span>
            ${u.ativo===false?'<span class="badge badge-inactive">Inativo</span>':statusBadge}</div>
          <div class="user-email">${esc(u.nome)} · ${esc(u.email)}</div>
          ${u.ativo!==false?`<div style="margin-top:4px"><div style="height:4px;border-radius:2px;background:var(--border);width:100%;max-width:160px"><div style="height:4px;border-radius:2px;background:${isComplete?'var(--green)':'var(--orange)'};width:${pct}%"></div></div></div>`:''}
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <label class="toggle-switch" title="${isSelf?'Você não pode remover seu próprio status de admin':''}">
            <input type="checkbox" ${u.role==='admin'?'checked':''} ${isSelf?'disabled':''} onchange="toggleAdminCheckbox('${u.uid}',this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:0.78rem;color:var(--text-muted);min-width:40px">ADMIN</span>
          ${!isSelf?`<button class="btn ${u.ativo===false?'btn-green':'btn-red'} btn-sm" onclick="toggleAtivo('${u.uid}',${u.ativo!==false})">${u.ativo===false?'Ativar':'Desativar'}</button>`:''}
          <button class="btn btn-secondary btn-sm" onclick="adminGoEditPalpites('${u.uid}')">✏️ Palpites</button>
          ${mailBtn}
          ${!isSelf?`<button class="btn btn-red btn-sm" onclick="deleteUserClick('${u.uid}','${esc(u.apelido)}')">🗑️ Excluir</button>`:''}
        </div>
      </div>`;
    });
    cont.innerHTML = html;
  } catch(e) { cont.innerHTML = `<div class="alert alert-error">Erro: ${esc(errMsg(e))}</div>`; }

async function deleteUser(uid) {
  try {
    showToast('⏳ Excluindo usuário...','');
    const batch = db_.batch();

    // Deletar todos os palpites do usuário
    const pSnap = await db_.collection('palpites').doc(uid).collection('jogos').get();
    pSnap.docs.forEach(d => batch.delete(d.ref));

    // Deletar documento de palpites
    batch.delete(db_.collection('palpites').doc(uid));

    // Deletar usuário
    batch.delete(db_.collection('usuarios').doc(uid));

    await batch.commit();
    showToast('✅ Usuário excluído com sucesso! (Remova manualmente do Firebase Auth no console)','success');
    renderAdminUsuarios();
  } catch(e) {
    showToast('❌ Erro ao excluir: '+e.message,'error');
  }
}

async function massLock(phase, lock) {
  const games = phase==='grupos'
    ? Object.values(GRUPOS_DATA).flatMap(g=>g.games)
    : Object.values(ELIM_DATA).flatMap(e=>e.games);
  if (!confirm(`Confirmar: ${lock?'bloquear':'desbloquear'} ${games.length} jogos?`)) return;
  try {
    const batch = db_.batch();
    games.forEach(g=>{ batch.set(db_.collection('resultados').doc(g.id),{locked:lock},{merge:true}); });
    await batch.commit();
    showToast(`✅ ${games.length} jogos ${lock?'bloqueados':'desbloqueados'}!`,'success');
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

async function exportFullExcel() {
  showToast('⏳ Gerando planilha...','');
  try {
    const [usersSnap, resSnap] = await Promise.all([db_.collection('usuarios').get(), db_.collection('resultados').get()]);
    const users = usersSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.ativo!==false);
    const res = {}; resSnap.docs.forEach(d=>{ res[d.id]=d.data(); });
    const allPals = {};
    await Promise.all(users.map(async u=>{ const pSnap = await db_.collection('palpites').doc(u.uid).collection('jogos').get(); allPals[u.uid]={}; pSnap.docs.forEach(p=>{ allPals[u.uid][p.id]=p.data(); }); }));
    const ranking = computeRanking(users, res, allPals);
    const totalJogosComResultado = Object.keys(res).filter(
      id => res[id].h_real !== undefined && res[id].a_real !== undefined
    ).length;

    // Sheet 1 - Ranking
    const rankingData = [['Posição','Participante','Apelido','Pontos','Exatos','Venc.+Saldo','Apenas Venc.','Jogos','% Aproveito']];
    ranking.forEach((u,i)=>{
      const pct = totalJogosComResultado > 0 ? Math.round((u.jogos / totalJogosComResultado) * 100) : 0;
      rankingData.push([i+1, u.nome, u.apelido, u.pontos, u.exatos, u.venc_saldo, u.apenas_venc, u.jogos, pct+'%']);
    });

    // Sheet 2 - Palpites (Matriz)
    const palpitesData = [['JogoID','Time_Casa','Time_Fora','Data',...users.map(u=>`${u.apelido}_Casa`),...users.map(u=>`${u.apelido}_Fora`)]];
    ALL_GAMES.forEach(g=>{
      const row = [g.id, g.h, g.a, g.date];
      users.forEach(u=>{ row.push(allPals[u.uid]?.[g.id]?.h??''); });
      users.forEach(u=>{ row.push(allPals[u.uid]?.[g.id]?.a??''); });
      palpitesData.push(row);
    });

    // Sheet 3 - Resultados Oficiais
    const resultadosData = [['JogoID','Time_Casa','Time_Fora','Resultado_Casa','Resultado_Fora','Bloqueado']];
    ALL_GAMES.forEach(g=>{
      const r = res[g.id];
      resultadosData.push([g.id, g.h, g.a, r?.h_real??'', r?.a_real??'', r?.locked?'SIM':'NÃO']);
    });

    // Sheet 4 - Configurações
    const cfgData = [['Configuração','Valor']];
    cfgData.push(['Nome do Bolão', CFG.nome_bolao]);
    cfgData.push(['Placar Exato', CFG.pts_exato]);
    cfgData.push(['Vencedor + Saldo', CFG.pts_vencedor_saldo]);
    cfgData.push(['Apenas Vencedor', CFG.pts_apenas_vencedor]);
    cfgData.push(['Bônus Classificação', CFG.pts_bonus_classificacao]);
    cfgData.push(['Palpite Campeão', CFG.pts_campeao]);
    cfgData.push(['Palpite Artilheiro', CFG.pts_artilheiro]);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rankingData), 'Ranking');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(palpitesData), 'Palpites');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resultadosData), 'Resultados');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cfgData), 'Configurações');
    XLSX.writeFile(wb, `Bolao_ICN_Copa2026_${fmtDate()}.xlsx`);
    showToast('✅ Planilha gerada com sucesso!','success');
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

async function exportRankingExcel() {
  showToast('⏳ Gerando ranking...','');
  try {
    const [usersSnap, resSnap] = await Promise.all([db_.collection('usuarios').get(), db_.collection('resultados').get()]);
    const users = usersSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.ativo!==false);
    const res = {}; resSnap.docs.forEach(d=>{ res[d.id]=d.data(); });
    const allPals = {};
    await Promise.all(users.map(async u=>{ const ps=await db_.collection('palpites').doc(u.uid).collection('jogos').get(); allPals[u.uid]={}; ps.docs.forEach(p=>{allPals[u.uid][p.id]=p.data();}); }));
    const ranking = computeRanking(users, res, allPals);
    const data = [['Posição','Participante','Apelido','Pontos','Exatos','Venc.+Saldo','Apenas Venc.','Jogos']];
    ranking.forEach((u,i)=>{
      data.push([i+1, u.nome, u.apelido, u.pontos, u.exatos, u.venc_saldo, u.apenas_venc, u.jogos]);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Ranking');
    XLSX.writeFile(wb, `Bolao_Ranking_${fmtDate()}.xlsx`);
    showToast('✅ Ranking exportado!','success');
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

async function exportPalpitesExcel() {
  showToast('⏳ Gerando palpites...','');
  try {
    const [usersSnap] = await Promise.all([db_.collection('usuarios').get()]);
    const users = usersSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.ativo!==false);
    const allPals = {};
    await Promise.all(users.map(async u=>{ const ps=await db_.collection('palpites').doc(u.uid).collection('jogos').get(); allPals[u.uid]={}; ps.docs.forEach(p=>{allPals[u.uid][p.id]=p.data();}); }));
    const data = [['JogoID','Time_Casa','Time_Fora','Data',...users.map(u=>`${u.apelido}_Casa`),...users.map(u=>`${u.apelido}_Fora`)]];
    ALL_GAMES.forEach(g=>{
      const row = [g.id, g.h, g.a, g.date];
      users.forEach(u=>{ row.push(allPals[u.uid]?.[g.id]?.h??''); });
      users.forEach(u=>{ row.push(allPals[u.uid]?.[g.id]?.a??''); });
      data.push(row);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Palpites');
    XLSX.writeFile(wb, `Bolao_Palpites_${fmtDate()}.xlsx`);
    showToast('✅ Palpites exportados!','success');
  } catch(e) { showToast('Erro: '+e.message,'error'); }
}

async function exportResultadosExcel() {
  showToast('⏳ Gerando resultados...','');
  try {
    const resSnap = await db_.collection('resultados').get();
    const res = {}; resSnap.docs.forEach(d=>{ res[d.id]=d.data(); });
    const data = [['JogoID','Time_Casa','Time_Fora','Resultado_Casa','Resultado_Fora','Bloqueado']];
    ALL_GAMES.forEach(g=>{
      const r = res[g.id];

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function toggleDropdown() {
  const menu = document.getElementById('dropdown-menu');
  if (menu) menu.classList.toggle('show');
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('bolao-theme', isLight ? 'light' : 'dark');
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = isLight ? '☀️' : '🌙';
}

(function applyStoredTheme() {
  if (localStorage.getItem('bolao-theme') === 'light') {
    document.body.classList.add('light-theme');
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-toggle-btn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

document.addEventListener('click', function(e) {
  const dropdown = document.querySelector('.nav-dropdown');
  if (dropdown && !dropdown.contains(e.target)) {
    const menu = document.getElementById('dropdown-menu');
    if (menu) menu.classList.remove('show');
  }
});

function errMsg(err) {
  if (!err) return 'Erro desconhecido';
  return err.message ? String(err.message) : String(err);
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate() { return new Date().toISOString().slice(0,10); }
function downloadFile(content, filename, type) {
  const blob = new Blob(['\uFEFF'+content],{type:type+';charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}
let toastTimer = null;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show'+(type?' '+type:'');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className='toast'; }, 3000);
}

function isMobileClient() {
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||'');
}

function isStandalonePwa() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function updatePwaInstallButton() {
  const btns = [
    document.getElementById('btn-install-pwa'),
    document.getElementById('btn-install-pwa-footer')
  ].filter(Boolean);
  if (!btns.length) return;
  const shouldShow = isMobileClient() && !isStandalonePwa();
  btns.forEach(btn => {
    btn.hidden = !shouldShow;
    btn.style.display = shouldShow ? 'inline-flex' : '';
    btn.disabled = !deferredPwaPrompt;
    btn.title = deferredPwaPrompt ? 'Instalar app' : 'Instalação indisponível no momento';
  });
}

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredPwaPrompt = event;
  updatePwaInstallButton();
});

window.addEventListener('appinstalled', () => {
  deferredPwaPrompt = null;
  updatePwaInstallButton();
  showToast('✅ App instalado com sucesso!', 'success');
});

async function installPwaApp() {
  if (!deferredPwaPrompt) {
    showToast('No iPhone, use Compartilhar → "Adicionar à Tela de Início".', 'warning');
    return;
  }
  deferredPwaPrompt.prompt();
  const choice = await deferredPwaPrompt.userChoice;
  if (choice && choice.outcome === 'accepted') {
    showToast('Instalação iniciada ✅', 'success');
  }
  deferredPwaPrompt = null;
  updatePwaInstallButton();
}
</script>
