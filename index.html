<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Bolão ICN Copa 2026</title>
<!-- App Version -->
<meta name="app-version" content="v1.4.0">
<!-- Firebase 9 Compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  // Garante que o Firebase esteja disponível antes de qualquer uso
  window.__firebaseReady = new Promise((resolve) => {
    if (typeof firebase !== 'undefined') { resolve(true); return; }
    const startedAt = Date.now();
    const maxWaitMs = 10000;
    const check = setInterval(() => {
      if (typeof firebase !== 'undefined') { clearInterval(check); resolve(true); return; }
      if (Date.now() - startedAt >= maxWaitMs) { clearInterval(check); resolve(false); }
    }, 50);
  });
</script>
<style>
/* ══════════════════════════════════════════
   RESET & VARIABLES
══════════════════════════════════════════ */
:root{
  --gold:#FFD700;--dark-blue:#0A1628;--mid-blue:#1A2E4A;
  --light-blue:#243857;--accent:#1E90FF;--green:#00C851;
  --red:#FF4444;--orange:#FF8C00;--white:#FFF;
  --text-muted:#8BA8C8;--border:#2D4870;--card:#1A2E4A;
}
body.light-theme{
  --dark-blue:#EFF3FA;--mid-blue:#DDE5F4;--card:#FFFFFF;
  --light-blue:#D0DAF0;--border:#B8C8E0;
  --white:#1A2E4A;--text-muted:#4A6080;
}
body.light-theme .app-header{background:linear-gradient(135deg,#c8d8f0,#dde5f4)}
body.light-theme .bottom-nav{background:#dde5f4;border-top-color:#b8c8e0}
body.light-theme .ranking-table td,
body.light-theme .ranking-table th{border-color:#d0daf0}
body.light-theme .ranking-table tr:hover td{background:rgba(0,0,0,.03)}
body.light-theme .ranking-table tr.is-me td{background:rgba(255,215,0,.12)}
body.light-theme .stat-card{background:rgba(0,0,0,.04)}
body.light-theme .pts-badge{background:rgba(255,215,0,.2);color:#8B6200}
body.light-theme .result-badge{background:rgba(0,150,50,.15);color:#006020}
body.light-theme .locked-badge{background:rgba(0,0,0,.08);color:#4A6080}
body.light-theme input.score-input,
body.light-theme input.result-input{background:#F8FAFF;border-color:#B8C8E0;color:#1A2E4A}
body.light-theme .dropdown-content{background:#fff;border-color:#B8C8E0}
body.light-theme .dropdown-content a:hover{background:rgba(255,215,0,.15)}
body.light-theme .back-bar{background:rgba(0,0,0,.04);border-color:rgba(255,140,0,.3)}
body.light-theme .alert-info{background:rgba(30,144,255,.08);border-color:rgba(30,144,255,.3);color:#1050A0}
body.light-theme .alert-warning{background:rgba(255,140,0,.08);border-color:rgba(255,140,0,.3);color:#804000}
body.light-theme .alert-success{background:rgba(0,200,81,.08);border-color:rgba(0,200,81,.3);color:#006030}
body.light-theme .alert-error{background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.3);color:#800020}
.theme-btn{
  padding:5px 8px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:1rem;
  transition:all .2s;line-height:1;
}
.theme-btn:hover{border-color:var(--gold);color:var(--gold)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark-blue);
  color:var(--white);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.app-header{
  background:linear-gradient(135deg,#060f1e,#1A2E4A);
  border-bottom:2px solid var(--gold);
  padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:12px;
}
.app-logo{font-size:1.1rem;font-weight:800;color:var(--gold);white-space:nowrap}
.app-nav{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto}
.app-nav::-webkit-scrollbar{display:none}
.nav-btn{
  padding:6px 12px;border-radius:8px;border:none;
  background:transparent;color:var(--text-muted);
  cursor:pointer;font-size:0.82rem;font-weight:600;
  white-space:nowrap;transition:all .2s;
}
.nav-btn:hover,.nav-btn.active{background:rgba(255,215,0,.12);color:var(--gold)}
.nav-btn.active{border-bottom:2px solid var(--gold)}
.app-user{display:flex;align-items:center;gap:8px;white-space:nowrap}
.user-name{font-size:0.82rem;color:var(--text-muted)}
.badge-admin{
  background:var(--gold);color:var(--dark-blue);
  font-size:0.65rem;font-weight:800;padding:2px 6px;border-radius:4px
}
.btn-logout{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:0.78rem;
  transition:all .2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ══════════════════════════════════════════
   SCREENS
══════════════════════════════════════════ */
.screen{min-height:100vh}
.hidden{display:none!important}
#screen-app{min-height:100vh;display:flex;flex-direction:column}
.page{display:none}
.page.active{display:block}
.container{max-width:1000px;margin:0 auto;padding:28px 16px 80px}

/* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
.auth-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:radial-gradient(ellipse at center top,#1A2E4A 0%,#0A1628 60%);
}
.auth-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:40px 36px;width:100%;max-width:440px;
}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:1.6rem;color:var(--gold)}
.auth-logo p{color:var(--text-muted);font-size:0.88rem;margin-top:6px}
.auth-logo .flags{font-size:1.6rem;letter-spacing:4px;margin-bottom:8px}
.auth-tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:28px}
.auth-tab{
  flex:1;padding:10px;background:transparent;border:none;
  color:var(--text-muted);cursor:pointer;font-weight:700;font-size:0.9rem;transition:all .2s;
}
.auth-tab.active{background:var(--gold);color:var(--dark-blue)}
.auth-footer-actions{margin-top:14px;display:flex;justify-content:center}
.btn-install-pwa{
  border:1px dashed var(--border);background:transparent;color:var(--text-muted);
  font-size:0.74rem;padding:6px 10px;border-radius:999px;cursor:pointer;
  line-height:1.2;white-space:nowrap;
}
.btn-install-pwa:hover{border-color:var(--gold);color:var(--gold)}
.btn-install-pwa:disabled{opacity:.6;cursor:not-allowed}

/* ══════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════ */
.form-group{margin-bottom:16px}
.form-group label{display:block;color:var(--gold);font-size:0.8rem;font-weight:700;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--white);font-size:0.95rem;border-radius:10px;outline:none;
  transition:all .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--gold);background:rgba(255,215,0,.07);
}
.form-group select option{background:var(--mid-blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{
  padding:12px 22px;border-radius:10px;border:none;
  font-size:0.9rem;font-weight:700;cursor:pointer;
  transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:linear-gradient(135deg,var(--gold),#FFA500);color:var(--dark-blue)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,.3)}
.btn-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:linear-gradient(135deg,var(--green),#009933);color:white}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,200,81,.3)}
.btn-red{background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.btn-red:hover{background:rgba(255,68,68,.25)}
.btn-sm{padding:6px 12px;font-size:0.78rem}
.btn-xs{padding:4px 8px;font-size:0.72rem}
.btn-full{width:100%;justify-content:center}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;margin-bottom:20px;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:1.05rem;color:var(--gold);font-weight:700;display:flex;align-items:center;gap:8px}
.section-title{
  font-size:1.1rem;font-weight:800;color:var(--white);
  margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.admin-phase-header{
  font-size:1rem;font-weight:800;color:var(--gold);
  background:linear-gradient(90deg,rgba(255,215,0,.12),rgba(255,215,0,0) 80%);
  border-left:4px solid var(--gold);
  padding:10px 14px;margin:18px 0 10px;border-radius:6px;
  letter-spacing:.3px;text-transform:uppercase;
}

/* ══════════════════════════════════════════
   STATS GRID
══════════════════════════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px}
.stat-card{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;padding:14px;text-align:center;
}
.stat-card .val{font-size:1.8rem;font-weight:800;color:var(--gold)}
.stat-card .lbl{font-size:0.72rem;color:var(--text-muted);margin-top:2px}

/* ══════════════════════════════════════════
   RANKING TABLE
══════════════════════════════════════════ */
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table th{
  background:rgba(255,215,0,.08);color:var(--gold);
  font-size:0.75rem;font-weight:700;text-align:left;
  padding:10px 12px;border-bottom:2px solid var(--border);
}
.ranking-table td{
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:0.88rem;vertical-align:middle;
}
.ranking-table tr:hover td{background:rgba(255,255,255,.03)}
.ranking-table tr.is-me td{background:rgba(255,215,0,.06)}
.rank-pos{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:0.85rem;background:var(--border);
}
.rank-pos.gold{background:var(--gold);color:var(--dark-blue)}
.rank-pos.silver{background:#C0C0C0;color:var(--dark-blue)}
.rank-pos.bronze{background:#CD7F32;color:var(--dark-blue)}
.pts-badge{
  background:rgba(255,215,0,.12);color:var(--gold);
  font-weight:800;padding:3px 8px;border-radius:6px;font-size:0.85rem;
}
.mini-bar{
  height:6px;background:var(--border);border-radius:3px;
  overflow:hidden;min-width:60px;margin-top:3px;
}
.mini-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),#FFA500);border-radius:3px}

/* ══════════════════════════════════════════
   PALPITES
══════════════════════════════════════════ */
.phase-tabs,.group-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.phase-tab{
  padding:7px 16px;border-radius:18px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:0.82rem;
  font-weight:600;transition:all .2s;
}
.phase-tab.active{background:var(--gold);color:var(--dark-blue);border-color:var(--gold)}
.phase-tab:hover:not(.active){border-color:var(--gold);color:var(--gold)}
.group-tab{
  width:38px;height:38px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;font-size:0.82rem;
  font-weight:700;transition:all .2s;
}
.group-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.group-tab.done{border-color:var(--green);color:var(--green)}
.group-tab.done.active{background:var(--green);color:var(--dark-blue)}
.group-tab:hover:not(.active){border-color:var(--accent)}
.game-row{
  display:grid;grid-template-columns:1fr 52px 24px 52px 1fr;
  align-items:center;gap:8px;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.game-row:last-child{border-bottom:none}
.team-name{font-size:0.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.team-name.home{text-align:right}
.score-input{
  width:52px;height:46px;background:rgba(255,215,0,.1);
  border:2px solid var(--gold);color:var(--white);font-size:1.2rem;
  font-weight:700;text-align:center;border-radius:10px;outline:none;
  transition:all .2s;-moz-appearance:textfield;
}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{border-color:#fff;background:rgba(255,215,0,.2)}
.score-input.filled{border-color:var(--green);background:rgba(0,200,81,.1)}
.score-input:disabled{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--text-muted);cursor:not-allowed}
.score-input.saving{border-color:var(--orange);box-shadow:0 0 6px rgba(255,140,0,.4)}
.score-input.saved-ok{border-color:var(--green);box-shadow:0 0 6px rgba(0,200,81,.4)}
.score-input.save-err{border-color:var(--red);box-shadow:0 0 6px rgba(255,60,60,.4)}
.vs-badge{background:var(--border);color:var(--text-muted);padding:3px 6px;border-radius:5px;font-size:0.7rem;font-weight:700;text-align:center}
.game-meta{font-size:0.7rem;color:var(--text-muted);text-align:center}
.locked-badge{font-size:0.68rem;background:rgba(255,68,68,.15);color:var(--red);padding:2px 6px;border-radius:4px;margin-left:4px}
.result-badge{font-size:0.7rem;background:rgba(0,200,81,.12);color:var(--green);padding:2px 8px;border-radius:4px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#FFA500);transition:width .3s}
.progress-text{font-size:0.75rem;color:var(--text-muted);margin-bottom:12px}

/* ══════════════════════════════════════════
   STANDINGS (TABELA)
══════════════════════════════════════════ */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.standings-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.standings-header{
  background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,215,0,.05));
  padding:10px 16px;font-weight:800;font-size:0.9rem;color:var(--gold);
  display:flex;align-items:center;gap:6px;
}
.standings-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.standings-table th{color:var(--text-muted);font-size:0.7rem;padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.standings-table th:first-child{text-align:left}
.standings-table td{padding:7px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.standings-table td:first-child{text-align:left;font-weight:600}
.standings-table tr:nth-child(-n+2) td{color:var(--green)}
.standings-table tr:nth-child(3) td{color:var(--orange)}

/* ══════════════════════════════════════════
   BRACKET
══════════════════════════════════════════ */
.bracket-wrap{overflow-x:auto;padding-bottom:20px}
.bracket{display:flex;gap:0;min-width:900px}
.bracket-round{flex:1;padding:0 6px}
.bracket-round h4{
  text-align:center;font-size:0.75rem;color:var(--text-muted);
  padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--border);
}
.bracket-games{display:flex;flex-direction:column;justify-content:space-around;height:100%}
.bracket-match{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;margin:4px 0;font-size:0.78rem;
}
.bracket-team{
  padding:4px 0;display:flex;justify-content:space-between;align-items:center;
}
.bracket-team.winner{color:var(--gold);font-weight:700}
.bracket-team + .bracket-team{border-top:1px dashed rgba(255,255,255,.08);margin-top:4px;padding-top:4px}
.bracket-score{font-weight:800;color:var(--green)}

/* ══════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════ */
.admin-tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:2px solid var(--border);padding-bottom:0}
.admin-tab{
  padding:10px 18px;border:none;background:transparent;
  color:var(--text-muted);cursor:pointer;font-weight:700;font-size:0.85rem;
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;
}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-tab:hover:not(.active){color:var(--white)}
.admin-content{display:none}
.admin-content.active{display:block}
.result-row{
  display:grid;grid-template-columns:1fr 56px 20px 56px 1fr auto;
  align-items:center;gap:10px;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.result-input{
  width:56px;height:46px;background:rgba(255,255,255,.06);
  border:2px solid var(--border);color:var(--white);
  font-size:1.2rem;font-weight:700;text-align:center;border-radius:10px;
  outline:none;transition:all .2s;-moz-appearance:textfield;
}
.result-input::-webkit-outer-spin-button,.result-input::-webkit-inner-spin-button{-webkit-appearance:none}
.result-input:focus{border-color:var(--accent)}
.result-input.saved{border-color:var(--green)}
.lock-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:transparent;cursor:pointer;font-size:1rem;transition:all .2s;
}
.lock-btn.locked{background:rgba(255,68,68,.15);border-color:var(--red);color:var(--red)}
.lock-btn:hover{border-color:var(--gold)}
.user-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;flex-wrap:wrap;gap:10px;
}
.user-info-col{flex:1;min-width:180px}
.user-name-big{font-weight:700;font-size:0.95rem}
.user-email{font-size:0.78rem;color:var(--text-muted)}
.user-meta{font-size:0.75rem;color:var(--text-muted);margin-top:2px}
.badge{
  display:inline-block;padding:3px 8px;border-radius:5px;
  font-size:0.7rem;font-weight:700;
}
.badge-user{background:rgba(30,144,255,.2);color:var(--accent)}
.badge-admin-tag{background:rgba(255,215,0,.2);color:var(--gold)}
.badge-inactive{background:rgba(255,68,68,.2);color:var(--red)}

/* ══════════════════════════════════════════
   TOGGLE SWITCH
══════════════════════════════════════════ */
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
  background:var(--border);border-radius:22px;transition:.3s;
}
.toggle-slider:before{
  content:'';position:absolute;height:16px;width:16px;
  left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;
}
.toggle-switch input:checked+.toggle-slider{background:var(--gold)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.toggle-switch input:disabled+.toggle-slider{opacity:0.5;cursor:not-allowed}
.toggle-switch input:disabled+.toggle-slider:before{background:var(--text-muted)}

/* ══════════════════════════════════════════
   NAV DROPDOWN
══════════════════════════════════════════ */
.nav-dropdown{position:relative;display:inline-block}
.dropdown-btn{
  padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;
  font-size:0.85rem;font-weight:600;transition:all .2s;
}
.dropdown-btn:hover{border-color:var(--gold);color:var(--gold)}
.dropdown-content{
  display:none;position:absolute;top:100%;left:0;background:var(--mid-blue);
  border:1px solid var(--border);border-radius:8px;z-index:150;min-width:180px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.dropdown-content.show{display:block}
.dropdown-content a{
  display:block;padding:10px 14px;color:var(--text-muted);text-decoration:none;
  transition:all .2s;cursor:pointer;font-size:0.88rem;
}
.dropdown-content a:hover{background:rgba(255,215,0,.1);color:var(--gold)}
@media(min-width:601px){.nav-dropdown{display:none}}

/* ══════════════════════════════════════════
   ALERTS & EMPTY STATES
══════════════════════════════════════════ */
.alert{padding:14px 18px;border-radius:10px;margin-bottom:16px;font-size:0.88rem;line-height:1.6}
.alert-info{background:rgba(30,144,255,.1);border:1px solid rgba(30,144,255,.3);color:#B0D0FF}
.alert-warning{background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.3);color:#FFD080}
.alert-success{background:rgba(0,200,81,.1);border:1px solid rgba(0,200,81,.3);color:#80FFB0}
.alert-error{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:#FFB0B0}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;color:var(--text-muted);
}
.loading-wrap{text-align:center;padding:40px;color:var(--text-muted)}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--mid-blue);border:1px solid var(--border);
  color:var(--white);padding:12px 18px;border-radius:10px;
  font-size:0.88rem;font-weight:600;z-index:9999;
  box-shadow:0 6px 24px rgba(0,0,0,.4);
  transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.warning{border-color:var(--orange);color:var(--orange)}

/* ══════════════════════════════════════════
   CONFIG SCREEN
══════════════════════════════════════════ */
.config-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at top,#1A2E4A,#0A1628);
}
.config-card{
  background:var(--card);border:1px solid var(--gold);
  border-radius:20px;padding:36px;max-width:600px;width:100%;
}
.config-card h2{color:var(--gold);font-size:1.3rem;margin-bottom:8px}
.config-card p{color:var(--text-muted);font-size:0.88rem;margin-bottom:24px;line-height:1.6}
.code-block{
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  border-radius:8px;padding:14px;font-family:monospace;font-size:0.78rem;
  color:#7FFF7F;margin:16px 0;white-space:pre;overflow-x:auto;line-height:1.6;
}

/* ══════════════════════════════════════════
   MISC
══════════════════════════════════════════ */
.save-indicator{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.78rem;color:var(--text-muted);margin-left:12px;
  transition:all .3s;
}
.save-indicator.saving{color:var(--orange)}
.save-indicator.saved{color:var(--green)}
.save-indicator.error{color:var(--red)}
.back-bar{
  background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.3);
  border-radius:10px;padding:10px 16px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.divider{height:1px;background:var(--border);margin:20px 0}
.text-gold{color:var(--gold)}
.text-muted{color:var(--text-muted)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.fw-bold{font-weight:700}
.mt-0{margin-top:0}.mb-0{margin-bottom:0}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* ══════════════════════════════════════════
   BOTTOM NAVIGATION (MOBILE)
══════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:56px;
  background:var(--mid-blue);border-top:1px solid var(--border);
  z-index:200;display:none;align-items:stretch;
}
.bottom-nav button{
  flex:1;background:transparent;border:none;
  color:var(--text-muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:1.1rem;padding:4px 2px;transition:all .2s;
}
.bottom-nav button span{font-size:0.58rem;font-weight:600}
.bottom-nav button.active{color:var(--gold)}
.bottom-nav button.active span{color:var(--gold)}
.app-main{flex:1}
.app-footer{
  text-align:center;padding:12px 16px;color:var(--text-muted);font-size:0.75rem;
  background:rgba(0,0,0,0.3);margin-top:0;border-top:1px solid var(--border);
}
.footer-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}

.stats-alt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stats-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px}

@media(max-width:600px){
  .bottom-nav{display:flex}
  .app-nav{display:none}
  .container{padding-bottom:76px;padding-left:12px;padding-right:12px}
  .grid2{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .standings-grid{grid-template-columns:1fr}
  .app-logo{font-size:0.88rem}
  .nav-btn{padding:5px 8px;font-size:0.75rem}
  .game-row{grid-template-columns:1fr 44px 20px 44px 1fr;gap:4px}
  .score-input{width:44px;height:42px;font-size:1rem}
  .result-row{grid-template-columns:1fr 46px 16px 46px 1fr auto;gap:4px}
  .result-input{width:46px;height:42px;font-size:1rem}
  .ranking-table .hide-mobile{display:none}
  .stats-pair{grid-template-columns:1fr}
  .card{padding:14px;border-radius:12px;margin-bottom:14px}

  .section-title{font-size:0.95rem;margin-bottom:14px}

  .toast{bottom:68px;right:12px;left:12px;max-width:none;text-align:center}

  .app-user .user-name{font-size:0.75rem;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

function initFirebase(cfg) {
  try {
    if (firebase.apps.length) { app_ = firebase.apps[0]; } else { app_ = firebase.initializeApp(cfg); }
    auth_ = firebase.auth();
    db_   = firebase.firestore();
    auth_.onAuthStateChanged(handleAuthState);
    return true;
  } catch(e) { console.error(e); return false; }
}

async function handleAuthState(user) {
  if (user) {
    currentUser = user;
    try {
      const snap = await db_.collection('usuarios').doc(user.uid).get();
      if (!snap.exists) {
        showLoading(false); showToast('Dados não encontrados. Tente novamente.','error');
        auth_.signOut(); return;
      }
      currentUserDoc = { uid: user.uid, ...snap.data() };
      await loadCFG();
      showApp();
      _restorePageFromHash();
    } catch(e) {
      showToast('Erro ao carregar dados: '+e.message,'error');
      showLoading(false); showAuth();
    }
  } else {
    currentUser = null; currentUserDoc = null;
    showLoading(false); showAuth();
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  updatePwaInstallButton();
  // Timeout de segurança: se o loading não sumir em 20s, força auth e avisa
  const loadingFallback = setTimeout(() => {
    const el = document.getElementById('screen-loading');
    if (el && !el.classList.contains('hidden')) {
      console.error('[bolao] screen-loading preso há 20s — forçando auth');
      showLoading(false); showAuth();
      setAuthError('login','O carregamento demorou demais. Tente Ctrl+Shift+R ou limpe os dados do site (DevTools → Application → Storage).');
    }
  }, 20000);
  const firebaseReady = await window.__firebaseReady;
  if (!firebaseReady) {
    clearTimeout(loadingFallback);
    showLoading(false);
    showAuth();
    setAuthError('login','Falha ao carregar serviços do Firebase. Verifique sua conexão e recarregue a página.');
    return;
  }
  if (!initFirebase(FIREBASE_CONFIG)) {
    clearTimeout(loadingFallback);
    showLoading(false);
    showAuth();
    setAuthError('login','Erro ao iniciar o Firebase. Recarregue a página ou contate o suporte.');
  }
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-pwd').value;
  if (!email||!pwd) { setAuthError('login','Preencha e-mail e senha'); return; }
  setAuthError('login','');
  try {
    show('screen-loading'); hide('screen-auth');
    await auth_.signInWithEmailAndPassword(email, pwd);
  } catch(e) {
    hide('screen-loading'); show('screen-auth');
    const msgs = { 'auth/user-not-found':'E-mail não encontrado','auth/wrong-password':'Senha incorreta','auth/invalid-credential':'E-mail ou senha incorretos','auth/invalid-email':'E-mail inválido','auth/too-many-requests':'Muitas tentativas. Tente mais tarde.' };
    setAuthError('login', msgs[e.code]||e.message);
  }
}

async function doRegister() {
  const nome   = document.getElementById('reg-nome').value.trim();
  const apelido= document.getElementById('reg-apelido').value.trim();
  const email  = document.getElementById('reg-email').value.trim();
  const pwd    = document.getElementById('reg-pwd').value;
  const pwd2   = document.getElementById('reg-pwd2').value;
  if (!nome||!apelido||!email||!pwd) { setAuthError('reg','Preencha todos os campos'); return; }
  if (pwd !== pwd2) { setAuthError('reg','Senhas não conferem'); return; }
  if (pwd.length < 6) { setAuthError('reg','Senha deve ter no mínimo 6 caracteres'); return; }
  setAuthError('reg','');
  try {
    show('screen-loading'); hide('screen-auth');
    const cred = await auth_.createUserWithEmailAndPassword(email, pwd);
    const role = 'user';
    await db_.collection('usuarios').doc(cred.user.uid).set({
      nome, apelido, email, role, ativo:true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db_.collection('palpites').doc(cred.user.uid).set({
      uid: cred.user.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});
  } catch(e) {
    hide('screen-loading'); show('screen-auth'); showAuthTab('register');
    const msgs = {'auth/email-already-in-use':'E-mail já cadastrado','auth/invalid-email':'E-mail inválido','auth/weak-password':'Senha fraca (mínimo 6 caracteres)'};
    setAuthError('reg', msgs[e.code]||e.message);
  }
}

function doLogout() {
  currentUser = null;
  currentUserDoc = null;
  myPalpites = {};
  resultados = {};
  auth_.signOut();
}

function setAuthError(form, msg) {
  const el = document.getElementById(form==='login'?'login-error':'reg-error');
  el.textContent = msg; el.style.display = msg?'block':'none';
}

function showAuthTab(tab) {
  document.getElementById('auth-login').style.display   = tab==='login'?'block':'none';
  document.getElementById('auth-register').style.display= tab==='register'?'block':'none';
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  setAuthError('login',''); setAuthError('reg','');
}

async function showForgotPwd() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { setAuthError('login','Insira seu e-mail acima primeiro'); return; }
  setAuthError('login','');
  try {
    await auth_.sendPasswordResetEmail(email);
    const successEl = document.getElementById('login-success');
    successEl.innerHTML = '✉️ <strong>E-mail de recuperação enviado!</strong><br>Verifique sua caixa de entrada e a pasta de spam. O link para resetar sua senha expira em 24 horas.';
    successEl.style.display = 'block';
    showToast('✉️ E-mail enviado! Verifique sua caixa de entrada','success');
  } catch(e) {
    const msgs = {'auth/user-not-found':'E-mail não encontrado','auth/invalid-email':'E-mail inválido'};
    setAuthError('login', msgs[e.code]||e.message);
  }
}

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const el = document.getElementById('page-'+page);
  if (el) el.classList.add('active');
  // Persiste a página no hash para sobreviver a reloads
  if (!_TRANSIENT_PAGES.has(page)) history.replaceState(null,'','#'+page);
  switch(page) {
    case 'dashboard':   renderDashboard(); break;
    case 'palpites':    renderPalpites(); break;
    case 'ver-palpites': renderVerPalpites(_pendingPalpitesUid); _pendingPalpitesUid=null; break;
    case 'ver-todos':   renderVerTodos(); break;
    case 'tabelas':     renderTabelas(); break;
    case 'chaveamento': renderChaveamento(); break;
    case 'regras':      renderRegras(); break;
    case 'estatisticas': renderEstatisticas(); break;
    case 'admin':       if (currentUserDoc?.role==='admin') renderAdmin(); break;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function _restorePageFromHash() {
  const hash = (location.hash||'').replace('#','').trim();
  const valid = ['dashboard','palpites','tabelas','chaveamento','regras','estatisticas','admin'];
  const page = valid.includes(hash) ? hash : 'dashboard';
  // admin só restaura se usuário for admin
  if (page === 'admin' && currentUserDoc?.role !== 'admin') return navigateTo('dashboard');
  navigateTo(page);
}

// ════════════════════════════════════════════
// RANKING LOGIC
// ════════════════════════════════════════════
function calcPontos(pal, res) {
  if (!pal || pal.h===undefined || pal.a===undefined) return null;
  if (res===undefined || res.h_real===undefined || res.a_real===undefined) return null;
  const ph=parseInt(pal.h), pa=parseInt(pal.a);
  const rh=parseInt(res.h_real), ra=parseInt(res.a_real);

  // 1. Placar exato
  if (ph===rh && pa===ra) return CFG.pts_exato;

  // 2. Vencedor + Saldo de gols
  const pSaldo = ph - pa;
  const rSaldo = rh - ra;
  const pRes = ph>pa?'H':ph<pa?'A':'D';
  const rRes = rh>ra?'H':rh<ra?'A':'D';
  if (pRes===rRes && pSaldo===rSaldo) return CFG.pts_vencedor_saldo||7;

  // 3. Apenas vencedor/empate
  if (pRes===rRes) return CFG.pts_apenas_vencedor||5;

  // 4. Errou
  return 0;
}

function computeRanking(users, resultados, allPalpites) {
  const jogosComResultado = Object.keys(resultados).filter(id=>
    resultados[id].h_real!==undefined && resultados[id].a_real!==undefined
  );
  return users
    .filter(u=>u.ativo!==false)
    .map(u=>{
      let pontos=0, exatos=0, venc_saldo=0, apenas_venc=0, jogos=0, erros=0;
      const pals = allPalpites[u.uid]||{};
      jogosComResultado.forEach(jid=>{
        const p=pals[jid], r=resultados[jid];
        if (!p) return;
        const pts = calcPontos(p,r);
        if (pts===null) return;
        jogos++; pontos+=pts;
        if (pts===CFG.pts_exato) exatos++;
        else if (pts===(CFG.pts_vencedor_saldo||7)) venc_saldo++;
        else if (pts===(CFG.pts_apenas_vencedor||5)) apenas_venc++;
        else if (pts===0) erros++;
      });
      return { ...u, pontos, exatos, venc_saldo, apenas_venc, jogos, erros };
    })
    .sort((a,b)=>b.pontos-a.pontos||b.exatos-a.exatos||b.venc_saldo-a.venc_saldo||b.apenas_venc-a.apenas_venc);
}

// ════════════════════════════════════════════
// AUTOMATIC ELIMINATION UPDATE
// ════════════════════════════════════════════
// Aplica atualização progressiva: cada partida decidida já popula o
// próximo confronto, sem esperar a fase inteira terminar. Posições
// desconhecidas permanecem como placeholder (ex.: "Venc. O1").

// Resolve placeholders "1º X" / "2º X" usando standings dos grupos.
function _resolveGroupPlaceholders(str, groupLeaders) {
  let out = str;
  for (const g of 'ABCDEFGHIJKL') {
    const g1 = groupLeaders[g]?.first;
    const g2 = groupLeaders[g]?.second;
    if (g1) out = out.replace(`1º ${g}`, g1);
    if (g2) out = out.replace(`2º ${g}`, g2);
  }
  return out;
}

function _hasFullResult(r) {
  return r && r.h_real !== undefined && r.a_real !== undefined;
}

function _computeBestThirds(resultados) {
  const thirds = [];
  let allGroupsComplete = true;
  Object.keys(GRUPOS_DATA).forEach(grp => {
    const grpGames = GRUPOS_DATA[grp].games;
    const allPlayed = grpGames.every(g => _hasFullResult(resultados[g.id]));
    if (!allPlayed) { allGroupsComplete = false; return; }
    const s = computeStandings(grp, resultados);
    const third = s[2];
    if (!third) return;
    thirds.push({ group: grp, team: third.team, pts: third.pts, sg: third.sg, gp: third.gp });
  });
  // O top-8 dos terceiros só é conhecido com os 12 grupos concluídos;
  // antes disso não publica nada para evitar remanejamento instável.
  if (!allGroupsComplete) return [];
  return thirds.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp||a.team.localeCompare(b.team,'pt-BR'));
}

function _createBestThirdAllocator(bestThirdsRanking) {
  // Apenas os 8 melhores 3ºs se classificam para a r32.
  const qualified = bestThirdsRanking.slice(0, 8);
  const usedTeams = new Set();
  const pickBest = (allowedGroups) => {
    // Preferência pela região, mas sempre dentro do pool qualificado.
    let found = qualified.find(t =>
      !usedTeams.has(t.team) && (!allowedGroups || allowedGroups.has(t.group))
    );
    // Se nenhum top-8 vem dessa região, pega o melhor qualificado restante
    // (evita que um 3º fora do top-8 tome o slot e empurre um top-8 pra fora).
    if (!found && allowedGroups) {
      found = qualified.find(t => !usedTeams.has(t.team));
    }
    if (!found) return null;
    usedTeams.add(found.team);
    return found.team;
  };
  return function resolveBestThird(str) {
    if (!str || !str.startsWith('Melhor 3º')) return str;
    if (str === 'Melhor 3º (A/B/C/D)') return pickBest(new Set(['A','B','C','D'])) || str;
    if (str === 'Melhor 3º (E/F/G/H)') return pickBest(new Set(['E','F','G','H'])) || str;
    if (str === 'Melhor 3º (I/J/K/L)') return pickBest(new Set(['I','J','K','L'])) || str;
    if (str === 'Melhor 3º restante') return pickBest(null) || str;
    return str;
  };
}

// Detecta se um nome ainda é placeholder (não foi resolvido para seleção real).
function _isPlaceholder(name) {
  return !name || /^(1º |2º |Melhor 3º|Venc\. |Perd\. )/.test(name);
}

// Resolve "Venc. Xxx" / "Perd. Xxx" a partir dos resultados da fase anterior.
// Só propaga se ambas as seleções do confronto anterior são nomes reais —
// evita que um placar com time-placeholder gere vencedor inválido em cascata.
function _resolveWinnerPlaceholders(str, prevPhaseKey, res) {
  let out = str;
  ELIM_DATA[prevPhaseKey].games.forEach(prev => {
    const r = res[prev.id] || {};
    const hTeam = r.h_team !== undefined ? r.h_team : prev.h;
    const aTeam = r.a_team !== undefined ? r.a_team : prev.a;
    // Só propaga se ambos os lados já têm seleção real
    if (_isPlaceholder(hTeam) || _isPlaceholder(aTeam)) return;
    const w = _winnerOf(r, hTeam, aTeam);
    const l = _loserOf(r, hTeam, aTeam);
    if (w) out = out.replace(`Venc. ${prev.id}`, w);
    if (l) out = out.replace(`Perd. ${prev.id}`, l);
  });
  return out;
}

// Aplica uma fase: grava h_team/a_team resolvidos; apaga campos
// que voltaram a ser placeholder (upstream foi limpo).
async function _applyBracketPhase(phaseKey, resolveFn, res) {
  const FV = firebase.firestore.FieldValue;
  const batch = db_.batch();
  let changes = 0;
  for (const game of ELIM_DATA[phaseKey].games) {
    const h = resolveFn(game.h);
    const a = resolveFn(game.a);
    const targetH = h === game.h ? undefined : h; // ainda placeholder?
    const targetA = a === game.a ? undefined : a;
    const cur = res[game.id] || {};
    const curH = cur.h_team;
    const curA = cur.a_team;
    if (targetH === curH && targetA === curA) continue;
    const patch = { updatedAt: FV.serverTimestamp() };
    patch.h_team = targetH === undefined ? FV.delete() : targetH;
    patch.a_team = targetA === undefined ? FV.delete() : targetA;
    batch.set(db_.collection('resultados').doc(game.id), patch, { merge: true });
    // reflete na cópia local para a próxima fase ler já resolvido
    res[game.id] = { ...cur, h_team: targetH, a_team: targetA };
    changes++;
  }
  if (changes) await batch.commit();
  return changes;
}

async function updateEliminationTeams() {
  try {
    isLoadingPage = true;
    const rSnap = await db_.collection('resultados').get();
    const res = {};
    rSnap.docs.forEach(d=>{ res[d.id]=d.data(); });

    // Standings por grupo: só publica 1º/2º quando o grupo está completo
    const groupLeaders = {};
    Object.keys(GRUPOS_DATA).forEach(grp => {
      const grpGames = GRUPOS_DATA[grp].games;
      const allPlayed = grpGames.every(g => _hasFullResult(res[g.id]));
      if (!allPlayed) { groupLeaders[grp] = {}; return; }
      const s = computeStandings(grp, res);
      groupLeaders[grp] = { first: s[0]?.team, second: s[1]?.team };
    });
    const bestThirdAllocator = _createBestThirdAllocator(_computeBestThirds(res));

    // r32: resolve a partir dos grupos
    await _applyBracketPhase('r32', str => bestThirdAllocator(_resolveGroupPlaceholders(str, groupLeaders)), res);
    // Fases seguintes: resolve Venc./Perd. da fase anterior (parcial permitido)
    await _applyBracketPhase('r16',     str => _resolveWinnerPlaceholders(str, 'r32',     res), res);
    await _applyBracketPhase('quartas', str => _resolveWinnerPlaceholders(str, 'r16',     res), res);
    await _applyBracketPhase('semi',    str => _resolveWinnerPlaceholders(str, 'quartas', res), res);
    await _applyBracketPhase('final',   str => _resolveWinnerPlaceholders(str, 'semi',    res), res);

    isLoadingPage = false;
    if (document.getElementById('page-admin')?.classList.contains('active')) {
      setTimeout(() => renderAdminResultados(), 300);
    }
  } catch(e) {
    console.error('Erro ao atualizar eliminatórias:', e);
    isLoadingPage = false;
  }
}

// Limpa apenas os nomes (h_team/a_team) das fases indicadas, sem criar
// documentos vazios. Usado pelo botão de reset manual no admin.
async function _resetBracketTeams(res, phaseKeys) {
  const FV = firebase.firestore.FieldValue;
  const batch = db_.batch();
  let toCommit = 0;
  phaseKeys.forEach(k => {
    ELIM_DATA[k].games.forEach(g => {
      const r = res[g.id];
      if (!r) return;
      if (r.h_team === undefined && r.a_team === undefined) return;
      batch.set(db_.collection('resultados').doc(g.id),
        { h_team: FV.delete(), a_team: FV.delete() },
        { merge: true });
      toCommit++;
    });
  });
  if (toCommit) await batch.commit();
}

// ════════════════════════════════════════════
// STANDINGS
// ════════════════════════════════════════════
function computeStandings(grupKey, resultados) {
  const grp = GRUPOS_DATA[grupKey];
  const stats = {};
  grp.teams.forEach(t=>{ stats[t]={pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0}; });
  grp.games.forEach(g=>{
    const r=resultados[g.id];
    if (!_hasFullResult(r)) return;
    const rh=parseInt(r.h_real),ra=parseInt(r.a_real);
    const h=stats[g.h],a=stats[g.a];
    h.j++; a.j++; h.gp+=rh; h.gc+=ra; a.gp+=ra; a.gc+=rh;
    h.sg=h.gp-h.gc; a.sg=a.gp-a.gc;
    if (rh>ra){ h.pts+=3;h.v++; a.d++; }
    else if (rh<ra){ a.pts+=3;a.v++; h.d++; }
    else { h.pts+=1;h.e++; a.pts+=1;a.e++; }
  });
  return Object.entries(stats)
    .map(([t,s])=>({team:t,...s}))
    .sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);
}

async function renderDashboard() {
  const cont = document.getElementById('dashboard-content');
  cont.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const [usersSnap, resSnap] = await Promise.all([
      db_.collection('usuarios').get(),
      db_.collection('resultados').get()
    ]);
    const users = usersSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.ativo!==false);
    const res = {}; resSnap.docs.forEach(d=>{ res[d.id]=d.data(); });
    const allPals = {};
    await Promise.all(users.map(async u=>{
      const pSnap = await db_.collection('palpites').doc(u.uid).collection('jogos').get();
      allPals[u.uid]={};
      pSnap.docs.forEach(p=>{ allPals[u.uid][p.id]=p.data(); });
    }));
    const ranking = computeRanking(users, res, allPals);
    const maxPts = ranking[0]?.pontos||1;
    const totalJogos = Object.keys(res).filter(id=>_hasFullResult(res[id])).length;
    const myRank = ranking.findIndex(r=>r.uid===currentUser.uid)+1;

    // Calcular variação de posição por rodada
    const roundDefs = [
      { id:'G1', gameIds: Object.values(GRUPOS_DATA).flatMap(g=>g.games.filter(gm=>gm.r===1).map(gm=>gm.id)) },
      { id:'G2', gameIds: Object.values(GRUPOS_DATA).flatMap(g=>g.games.filter(gm=>gm.r===2).map(gm=>gm.id)) },
      { id:'G3', gameIds: Object.values(GRUPOS_DATA).flatMap(g=>g.games.filter(gm=>gm.r===3).map(gm=>gm.id)) },
      ...Object.keys(ELIM_DATA).map(ph=>({ id:ph, gameIds: ELIM_DATA[ph].games.map(g=>g.id) }))
    ];
    const gamesWithRes = new Set(Object.keys(res).filter(id=>_hasFullResult(res[id])));
    let latestRoundIdx = -1;
    roundDefs.forEach((rd,idx)=>{ if(rd.gameIds.some(id=>gamesWithRes.has(id))) latestRoundIdx=idx; });
    const positionDeltas = {};
    if (latestRoundIdx > 0) {
      const latestIds = new Set(roundDefs[latestRoundIdx].gameIds);
      const resPrev = {};
      Object.entries(res).forEach(([id,data])=>{ if(!latestIds.has(id)) resPrev[id]=data; });
      computeRanking(users, resPrev, allPals).forEach((u,idx)=>{ positionDeltas[u.uid]=idx+1; });
    }

    if (users.length === 0) {
      cont.innerHTML = `<div class="section-title">🏆 ${esc(CFG.nome_bolao)}</div>
        <div class="card" style="text-align:center;padding:40px 20px">
          <div style="font-size:2.5rem;margin-bottom:12px">👋</div>
          <h3 style="margin:0 0 8px;color:var(--gold)">Bem-vindo ao Bolão!</h3>
          <p style="color:var(--text-muted);margin:0 0 16px">Ainda não há participantes. Compartilhe o link para que as pessoas se registrem.</p>
          <button class="btn btn-primary" onclick="navigateTo('palpites')">⚽ Comece seus palpites</button>
        </div>`;
      return;
    }

    let html = `
      <div class="section-title">🏆 ${esc(CFG.nome_bolao)}</div>
      <div style="background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,215,0,.05));border:2px solid var(--gold);border-radius:12px;padding:20px;margin-bottom:24px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
          <div style="text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--gold)">${ranking.length}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Participantes</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--green)">${totalJogos}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Com Resultado</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--accent)">${ALL_GAMES.length}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Total de Jogos</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:2rem;font-weight:800;color:var(--orange)">${myRank||'—'}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">Sua Posição</div>
          </div>
        </div>
      </div>`;

    if (totalJogos === 0) {
      html += `<div class="card" style="text-align:center;padding:24px">
        <p style="color:var(--text-muted);margin:0">⏳ Nenhum resultado lançado ainda. O ranking será atualizado após o admin inserir os resultados dos jogos.</p>
      </div>`;
    }

    html += `<div class="card" style="padding:0;overflow:hidden">
        <table class="ranking-table">
          <thead><tr>
            <th>#</th><th>Participante</th><th>Pontos</th>
            <th class="hide-mobile">Exatos</th><th class="hide-mobile">V+Saldo</th><th class="hide-mobile">Vencedor</th>
            <th class="hide-mobile">Jogos</th><th>%</th><th class="hide-mobile" title="Distância para o líder">Dist.</th>
          </tr></thead><tbody>`;

    ranking.forEach((u,i)=>{
      const pos=i+1;
      const pct = totalJogos>0 ? Math.round(u.jogos/totalJogos*100) : 0;
      const posClass = pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
      const isMe = u.uid===currentUser.uid;
      const prevPos = positionDeltas[u.uid];
      const delta = prevPos ? prevPos - pos : null;
      const deltaBadge = delta === null ? '' :
        delta > 0 ? `<span style="font-size:0.65rem;font-weight:700;color:var(--green);display:block;line-height:1">↑${delta}</span>` :
        delta < 0 ? `<span style="font-size:0.65rem;font-weight:700;color:#ff6b6b;display:block;line-height:1">↓${Math.abs(delta)}</span>` :
        `<span style="font-size:0.65rem;color:var(--text-muted);display:block;line-height:1">=</span>`;
      const distLider = pos===1 ? '<span style="color:var(--gold)">👑</span>' : `<span style="font-size:0.8rem;color:var(--text-muted)">-${ranking[0].pontos - u.pontos}</span>`;
      html += `<tr class="${isMe?'is-me':''}">
        <td><span class="rank-pos ${posClass}">${pos}</span>${deltaBadge}</td>
        <td style="cursor:pointer" onclick="goToUserPalpites('${u.uid}')"><div class="fw-bold" style="color:var(--gold)">${esc(u.apelido)}</div><div style="font-size:0.75rem;color:var(--text-muted)">${esc(u.nome)}</div></td>
        <td><span class="pts-badge">${u.pontos}</span></td>
        <td class="hide-mobile text-green">${u.exatos}</td>
        <td class="hide-mobile text-gold">${u.venc_saldo}</td>
        <td class="hide-mobile text-gold">${u.apenas_venc}</td>
        <td class="hide-mobile text-muted">${u.jogos}</td>
        <td><div class="mini-bar"><div class="mini-bar-fill" style="width:${maxPts>0?Math.round(u.pontos/maxPts*100):0}%"></div></div>
          <div style="font-size:0.68rem;color:var(--text-muted)">${pct}%</div></td>
        <td class="hide-mobile">${distLider}</td>
      </tr>`;
    });

    html += `</tbody></table></div>
    <p style="text-align:center;color:var(--text-muted);font-size:0.78rem;margin-top:8px">
      ${CFG.pts_exato} pts exato · ${CFG.pts_vencedor_saldo} pts vencedor+saldo · ${CFG.pts_apenas_vencedor} pts vencedor</p>`;
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="alert alert-error">Erro ao carregar ranking: ${esc(errMsg(e))}</div>`;
  }
}

      data.games.forEach(game=>{ html += buildPalRow(game); });
      html += `</div>`;
    });

    html += `</div>`;
    cont.innerHTML = html;
    updatePalProgress();
    updateGroupTabState();
  } catch(e) {
    cont.innerHTML = `<div class="alert alert-error">Erro: ${esc(errMsg(e))}</div>`;
  }
}

function buildPalRow(game) {
  const pal = myPalpites[game.id]||{};
  const res = resultados[game.id]||{};
  const locked = res.locked===true;
  const hasResult = res.h_real!==undefined;
  const pts = calcPontos(pal,res);
  const isClosed = locked || hasResult;
  const closeAttr = isClosed ? `readonly onclick="showPalpiteClosedReason('${game.id}')" onfocus="showPalpiteClosedReason('${game.id}')"` : '';
  const iCls = (pal.h!==undefined&&pal.a!==undefined)?'filled':'';
  const lockedBadge = isClosed?`<span class="locked-badge">🔒 Encerrado</span>`:'';
  const resultBadge = hasResult?`<span class="result-badge">${res.h_real}–${res.a_real}</span>`:'';
  const ptsBadge = pts!==null?`<span class="result-badge" style="${pts===CFG.pts_exato?'background:rgba(255,215,0,.15);color:var(--gold)':pts===0?'background:rgba(255,68,68,.1);color:var(--red)':''}">${pts>0?'+'+pts:'0'}pts</span>`:'';
  const flagH = COUNTRY_FLAGS[game.h] || '';
  const flagA = COUNTRY_FLAGS[game.a] || '';
  const time = GAME_TIMES[game.id] || '--:--';
  return `<div class="game-row">
    <div><div class="team-name home">${flagH} ${esc(game.h)}</div><div class="game-meta">${game.date} <span style="font-weight:700;color:var(--gold)">${time}</span></div></div>
    <input type="number" class="score-input ${iCls}" id="ph_${game.id}" min="0" max="20" placeholder="–" value="${pal.h!==undefined?pal.h:''}" ${closeAttr} oninput="onPalInput('${game.id}','h',this.value)">
    <div class="vs-badge">✕</div>
    <input type="number" class="score-input ${iCls}" id="pa_${game.id}" min="0" max="20" placeholder="–" value="${pal.a!==undefined?pal.a:''}" ${closeAttr} oninput="onPalInput('${game.id}','a',this.value)">
    <div><div class="team-name">${flagA} ${esc(game.a)}</div><div class="game-meta flex">${lockedBadge}${resultBadge}${ptsBadge}</div></div>
  </div>`;
}

function switchPalGroup(grp) {

function onPalInput(gameId, side, value) {
  const v = value===''?undefined:Math.max(0,Math.min(20,parseInt(value)||0));
  if (!myPalpites[gameId]) myPalpites[gameId]={};
  myPalpites[gameId][side] = v;
  const other = myPalpites[gameId][side==='h'?'a':'h'];
  const thisInp = document.getElementById(`p${side}_${gameId}`);
  const otherInp = document.getElementById(`p${side==='h'?'a':'h'}_${gameId}`);
  const filled = v!==undefined && other!==undefined;
  if (thisInp) thisInp.classList.toggle('filled',filled);
  if (otherInp) otherInp.classList.toggle('filled',filled);
  updatePalProgress();
  updateGroupTabState();
  if (saveDebounce[gameId]) clearTimeout(saveDebounce[gameId]);
  saveDebounce[gameId] = setTimeout(()=>savePalpite(gameId), 800);
}

async function savePalpite(gameId) {
  const pal = myPalpites[gameId];
  if (!pal||pal.h===undefined||pal.a===undefined) return;
  const res = resultados[gameId]||{};
  if (res.locked===true || res.h_real!==undefined) {
    showPalpiteClosedReason(gameId);
    return;
  }
  const uid = palpitesEditing||currentUser.uid;
  const hInp = document.getElementById(`ph_${gameId}`);
  const aInp = document.getElementById(`pa_${gameId}`);
  if (hInp) hInp.classList.add('saving');
  if (aInp) aInp.classList.add('saving');
  try {
    await db_.collection('palpites').doc(uid).set({
      uid,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge:true});
    await db_.collection('palpites').doc(uid).collection('jogos').doc(gameId).set({
      h: pal.h, a: pal.a, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    if (hInp) { hInp.classList.remove('saving'); hInp.classList.add('saved-ok'); }
    if (aInp) { aInp.classList.remove('saving'); aInp.classList.add('saved-ok'); }
    setTimeout(()=>{ if(hInp) hInp.classList.remove('saved-ok'); if(aInp) aInp.classList.remove('saved-ok'); }, 1500);
  } catch(e) {
    if (hInp) { hInp.classList.remove('saving'); hInp.classList.add('save-err'); }
    if (aInp) { aInp.classList.remove('saving'); aInp.classList.add('save-err'); }
    showToast('Erro ao salvar: '+e.message,'error');
  }
}

function showPalpiteClosedReason(gameId) {
  const res = resultados[gameId] || {};
  if (res.locked===true) {
    showToast('Este jogo está bloqueado. Não é mais possível alterar palpites.','warning');
    return;
  }
  if (res.h_real!==undefined) {
    showToast('Resultado oficial já lançado. Não é mais possível alterar palpites.','warning');
    return;
  }
  showToast('Este jogo está encerrado para palpites.','warning');
}

function updatePalProgress() {
  const all = ALL_GAMES;
  const filled = all.filter(g=>{ const p=myPalpites[g.id]; return p&&p.h!==undefined&&p.a!==undefined; });
  const pct = Math.round(filled.length/all.length*100);
  const el = document.getElementById('pal-progress-fill');
  const et = document.getElementById('pal-progress-text');
  if (el) el.style.width=pct+'%';
  if (et) et.textContent=`${filled.length} de ${all.length} palpites preenchidos (${pct}%)`;
}

function updateGroupTabState() {
  document.querySelectorAll('.group-tab').forEach(btn=>{
    const grp = btn.dataset.group;
    if (!grp) return;
    const done = GRUPOS_DATA[grp].games.every(g=>{ const p=myPalpites[g.id]; return p&&p.h!==undefined&&p.a!==undefined; });
    btn.classList.toggle('done', done);
  });
}

      ...Object.entries(ELIM_DATA).map(([,v])=>({ label:`${v.icon} ${v.label}`, ids: new Set(v.games.map(g=>g.id)) }))
    ];

    let html = `<div class="section-title">📋 Todos os Palpites</div>
      <div class="back-bar">
        <span style="font-size:0.82rem;color:var(--text-muted)">🟡 Exato &nbsp;🟢 Acerto &nbsp;🔴 Erro</span>
        <button class="btn" style="padding:6px 12px;font-size:0.8rem" onclick="navigateTo('ver-palpites')">👁️ Por Pessoa</button>
      </div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="ranking-table" style="min-width:${160+users.length*72}px;font-size:0.8rem">
        <thead><tr>
          <th style="text-align:left;min-width:130px;position:sticky;left:0;z-index:2;background:var(--mid-blue)">Jogo</th>
          <th style="min-width:55px">Data</th>
          <th style="min-width:55px">Result.</th>
          ${users.map(u=>`<th style="min-width:68px;cursor:pointer;color:var(--gold)" onclick="goToUserPalpites('${u.uid}')" title="Ver palpites de ${esc(u.apelido)}">${esc(u.apelido)}</th>`).join('')}
        </tr></thead>
        <tbody>`;

    let lastPhase = -1;
    gamesOrdered.forEach(g=>{
      const phaseIdx = phaseGroups.findIndex(p=>p.ids.has(g.id));
      if (phaseIdx !== lastPhase) {
        lastPhase = phaseIdx;
        if (phaseIdx !== -1)
          html += `<tr><td colspan="${3+users.length}" style="background:rgba(255,215,0,.07);color:var(--gold);font-weight:700;font-size:0.75rem;padding:7px 10px;text-align:left;position:sticky;left:0">${phaseGroups[phaseIdx].label}</td></tr>`;
      }
      const r = res[g.id]||{};
      const hasResult = r.h_real!==undefined;
      const resultStr = hasResult?`${r.h_real}-${r.a_real}`:'—';
      const flagH = COUNTRY_FLAGS[g.h]||'';
      const flagA = COUNTRY_FLAGS[g.a]||'';
      const short = t => t.split(' ')[0];
      html += `<tr>
        <td style="text-align:left;white-space:nowrap;position:sticky;left:0;z-index:1;background:var(--card)">${flagH} ${esc(short(g.h))} × ${flagA} ${esc(short(g.a))}</td>
        <td style="color:var(--text-muted);font-size:0.73rem;white-space:nowrap">${g.date||'—'}</td>
        <td style="font-weight:600;color:${hasResult?'var(--green)':'var(--text-muted)'};white-space:nowrap">${resultStr}</td>`;
      users.forEach(u=>{
        const pal = allPals[u.uid]?.[g.id];
        if (!pal||pal.h===undefined) { html += `<td style="color:var(--text-muted)">—</td>`; return; }
        const pts = calcPontos(pal, r);
        const palStr = `${pal.h}-${pal.a}`;
        let bg='', col='';
        if (pts===CFG.pts_exato)        { bg='rgba(255,215,0,.12)'; col='var(--gold)'; }
        else if (pts!==null && pts>0)   { col='var(--green)'; }
        else if (pts===0 && hasResult)  { col='#ff6b6b'; }
        html += `<td style="${bg?`background:${bg};`:''}${col?`color:${col};`:''}font-weight:600">${palStr}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="alert alert-error">Erro: ${esc(errMsg(e))}</div>`;
  }
}

// ESTATÍSTICAS — HELPERS
// ════════════════════════════════════════════
const _MONTH_MAP = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function _parseGameDate(dateStr) {
  const m = (dateStr||'').match(/([A-Za-z]+)\s+(\d+)/);
  return m ? new Date(2026, _MONTH_MAP[m[1]] ?? 5, parseInt(m[2])) : new Date(9999, 0, 1);
}

function _uniqueGameDates() {
  const seen = new Set();
  ALL_GAMES.forEach(g => { if (g.date) seen.add(g.date); });
  return Array.from(seen).sort((a,b) => _parseGameDate(a) - _parseGameDate(b));
}

// IDs dos jogos de fase eliminatória (R32, R16, Quartas, Semi, Final/3º)
const ELIM_GAME_IDS = new Set(
  Object.values(ELIM_DATA).flatMap(e => e.games.map(g => g.id))
);
function _isElim(gameId) { return ELIM_GAME_IDS.has(gameId); }

// Vencedor da partida considerando penaltis em caso de empate no tempo normal.
// Para pontuação do bolão, apenas h_real/a_real (90 min) são considerados em calcPontos.
function _winnerOf(r, fallbackH, fallbackA) {
  if (!r || r.h_real === undefined || r.a_real === undefined) return null;
  const hr = parseInt(r.h_real), ar = parseInt(r.a_real);
  const hTeam = r.h_team || fallbackH;
  const aTeam = r.a_team || fallbackA;
  if (hr > ar) return hTeam;
  if (ar > hr) return aTeam;
  if (r.h_pen !== undefined && r.a_pen !== undefined) {
    const hp = parseInt(r.h_pen), ap = parseInt(r.a_pen);
    if (hp > ap) return hTeam;
    if (ap > hp) return aTeam;
  }
  return null; // empate sem penaltis definidos
}
function _loserOf(r, fallbackH, fallbackA) {
  const w = _winnerOf(r, fallbackH, fallbackA);
  if (!w) return null;
  const hTeam = r.h_team || fallbackH;
  return w === hTeam ? (r.a_team || fallbackA) : hTeam;
}
function _hasDecided(r) {
  if (!r || r.h_real === undefined || r.a_real === undefined) return false;
  if (parseInt(r.h_real) !== parseInt(r.a_real)) return true;
  return r.h_pen !== undefined && r.a_pen !== undefined && parseInt(r.h_pen) !== parseInt(r.a_pen);
}

function calcUserAccuracyStats(uid, allPals, res) {
  const gamesOrdered = ALL_GAMES
    .filter(g => _hasFullResult(res[g.id]))
    .sort((a, b) => _parseGameDate(a.date) - _parseGameDate(b.date));
  const userPals = allPals[uid] || {};
  let acertos = 0, exatos = 0, totalGolDiff = 0, count = 0, maxStreak = 0, tempStreak = 0;
  for (const g of gamesOrdered) {
    const p = userPals[g.id];
    if (!p) { tempStreak = 0; continue; }
    count++;
    const pts = calcPontos(p, res[g.id]);
    if (pts >= (CFG.pts_apenas_vencedor || 5)) {
      acertos++; tempStreak++; maxStreak = Math.max(maxStreak, tempStreak);
    } else { tempStreak = 0; }
    if (pts === CFG.pts_exato) exatos++;
    totalGolDiff += Math.abs(parseInt(p.h) - parseInt(res[g.id].h_real)) + Math.abs(parseInt(p.a) - parseInt(res[g.id].a_real));
  }
  let currentStreak = 0;
  for (let i = gamesOrdered.length - 1; i >= 0; i--) {
    const p = userPals[gamesOrdered[i].id];
    if (!p) break;
    const pts = calcPontos(p, res[gamesOrdered[i].id]);
    if (pts >= (CFG.pts_apenas_vencedor || 5)) currentStreak++;
    else break;
  }
  return {
    acertoPct: count > 0 ? (acertos / count * 100).toFixed(1) : '-',
    exatoPct: count > 0 ? (exatos / count * 100).toFixed(1) : '-',
    erroMedio: count > 0 ? (totalGolDiff / count).toFixed(1) : '-',
    currentStreak, maxStreak, count
  };
}

function calcAltRankings(users, allPals) {
  return users.map(u => {
    const pals = allPals[u.uid] || {};
    let empates = 0, totalGols = 0, totalPals = 0;
    for (const p of Object.values(pals)) {
      if (parseInt(p.h) === parseInt(p.a)) empates++;
      totalGols += (parseInt(p.h) || 0) + (parseInt(p.a) || 0);
      totalPals++;
    }
    return { ...u, empates, mediaGols: totalPals > 0 ? totalGols / totalPals : 0, totalPals };
  });
}

function generateInsights(ranking, userAccStats, analiseJogos, res) {
  const insights = [];
  ranking.forEach(u => {
    const s = userAccStats[u.uid];
    if (s && s.currentStreak >= 3)
      insights.push(`🔥 <b>${esc(u.apelido || u.nome)}</b> está em alta com ${s.currentStreak} acertos seguidos!`);
  });
  if (ranking.length >= 2 && ranking[0].pontos > 0) {
    const diff = ranking[0].pontos - ranking[1].pontos;
    if (diff > 0) insights.push(`👑 <b>${esc(ranking[0].apelido || ranking[0].nome)}</b> lidera com ${diff} pts de vantagem`);
    else insights.push(`⚔️ Empate na liderança entre <b>${esc(ranking[0].apelido || ranking[0].nome)}</b> e <b>${esc(ranking[1].apelido || ranking[1].nome)}</b>!`);
  }
  const withCount = ranking.filter(u => userAccStats[u.uid] && userAccStats[u.uid].count > 0);
  if (withCount.length > 0) {
    const best = withCount.slice().sort((a,b) => parseFloat(userAccStats[b.uid].acertoPct) - parseFloat(userAccStats[a.uid].acertoPct))[0];
    insights.push(`💎 <b>${esc(best.apelido || best.nome)}</b> tem o melhor aproveitamento: ${userAccStats[best.uid].acertoPct}%`);
  }
  Object.entries(analiseJogos).forEach(([jid, data]) => {
    if (data.palpites.length > 0 && data.exatos === 0 && data.venc_saldo === 0 && data.apenas_venc === 0)
      insights.push(`😱 Ninguém acertou o resultado de <b>${esc(data.game?.h||jid)} × ${esc(data.game?.a||'')}</b>`);
  });
  if (withCount.length > 0) {
    const sniper = withCount.slice().sort((a,b) => b.exatos - a.exatos)[0];
    if (sniper.exatos > 0)
      insights.push(`🎯 <b>${esc(sniper.apelido || sniper.nome)}</b> é o melhor sniper com ${sniper.exatos} placares exatos!`);
  }
  return insights;
}

// ESTATÍSTICAS PAGE
// ════════════════════════════════════════════
async function renderEstatisticas() {
  const cont = document.getElementById('estatisticas-content');
  cont.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const [usersSnap, resSnap] = await Promise.all([db_.collection('usuarios').get(), db_.collection('resultados').get()]);
    const users = usersSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.ativo!==false);
    const res = {}; resSnap.docs.forEach(d=>{ res[d.id]=d.data(); });
    const allPals = {};
    await Promise.all(users.map(async u=>{ const ps=await db_.collection('palpites').doc(u.uid).collection('jogos').get(); allPals[u.uid]={}; ps.docs.forEach(p=>{allPals[u.uid][p.id]=p.data();}); }));

    const jogosComResultado = Object.keys(res).filter(id=>_hasFullResult(res[id]));
    const totalJogos = jogosComResultado.length;

    // Análise por jogo
    const analiseJogos = {};
    jogosComResultado.forEach(jid=>{
      analiseJogos[jid] = { exatos:0, venc_saldo:0, apenas_venc:0, erros:0, palpites:[] };
      ALL_GAMES.forEach(g=>{ if(g.id===jid) analiseJogos[jid].game=g; });
      users.forEach(u=>{
        const p=allPals[u.uid]?.[jid];
        if(!p) return;
        const pts = calcPontos(p,res[jid]);
        analiseJogos[jid].palpites.push({user:u,palpite:p,pts});
        if(pts===CFG.pts_exato) analiseJogos[jid].exatos++;
        else if(pts===(CFG.pts_vencedor_saldo||7)) analiseJogos[jid].venc_saldo++;
        else if(pts===(CFG.pts_apenas_vencedor||5)) analiseJogos[jid].apenas_venc++;
        else analiseJogos[jid].erros++;
      });
    });

    // Encontrar jogo mais acertado
    let maiorAcerto = {exatos:0,id:''};
    Object.entries(analiseJogos).forEach(([id,data])=>{ if(data.exatos>maiorAcerto.exatos) maiorAcerto={exatos:data.exatos,id}; });

    // Placar mais comum
    const placarFreq = {};
    jogosComResultado.forEach(jid=>{
      analiseJogos[jid].palpites.forEach(p=>{
        const key=`${p.palpite.h}-${p.palpite.a}`;
        placarFreq[key]=(placarFreq[key]||0)+1;
      });
    });
    const placarMaisComum = Object.entries(placarFreq).sort((a,b)=>b[1]-a[1])[0];

    // Resultado mais comum
    const resultFreq = {};
    jogosComResultado.forEach(jid=>{
      const r=res[jid];
      const key=`${r.h_real}-${r.a_real}`;
      resultFreq[key]=(resultFreq[key]||0)+1;
    });
    const resultMaisComum = Object.entries(resultFreq).sort((a,b)=>b[1]-a[1])[0];

    // Dificuldade dos jogos
    const gameDifficulty = Object.entries(analiseJogos)
      .filter(([,d]) => d.palpites.length > 0)
      .map(([jid, d]) => {
        const acertos = d.exatos + d.venc_saldo + d.apenas_venc;
        return { jid, game: d.game, acertos, total: d.palpites.length, pct: acertos / d.palpites.length * 100 };
      }).sort((a,b) => a.pct - b.pct);
    const maisDificil = gameDifficulty[0];
    const maisFacil = gameDifficulty[gameDifficulty.length - 1];

    // Ranking e precisão por usuário
    const ranking = computeRanking(users, res, allPals);
    const userAccStats = {};
    users.forEach(u => { userAccStats[u.uid] = calcUserAccuracyStats(u.uid, allPals, res); });

    // Rankings alternativos
    const altData = calcAltRankings(ranking, allPals);
    const melhorSniper = altData.slice().sort((a,b) => b.exatos - a.exatos)[0];
    const maisZicado = altData.slice().sort((a,b) => b.erros - a.erros)[0];
    const reiEmpates = altData.slice().sort((a,b) => b.empates - a.empates)[0];
    const apostadorOusado = altData.slice().sort((a,b) => b.mediaGols - a.mediaGols)[0];

    // Insights automáticos
    const insights = generateInsights(ranking, userAccStats, analiseJogos, res);

    let html = `<div class="section-title">📈 Estatísticas & Curiosidades</div>

      <div class="stats-grid">
        <div class="stat-card"><div class="val">${users.length}</div><div class="lbl">Participantes</div></div>
        <div class="stat-card"><div class="val">${totalJogos}</div><div class="lbl">Jogos Resultado</div></div>
        <div class="stat-card"><div class="val">${Object.values(analiseJogos).reduce((a,b)=>a+b.exatos,0)}</div><div class="lbl">Placares Exatos</div></div>
        <div class="stat-card"><div class="val">${maiorAcerto.exatos}</div><div class="lbl">Máx Acertos 1 Jogo</div></div>
      </div>`;

    // ── Insights automáticos ──
    if (insights.length > 0) {
      html += `<div class="card">
        <div class="card-title">💡 Insights do Bolão</div>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">
          ${insights.map(i=>`<div style="background:rgba(255,255,255,0.04);border-left:3px solid var(--gold);border-radius:6px;padding:10px 14px;font-size:0.88rem;line-height:1.4">${i}</div>`).join('')}
        </div>
      </div>`;
    }

    // ── Rankings alternativos ──
    if (totalJogos > 0 && ranking.length > 0) {
      const mkAward = (emoji, title, color, user, sub) => user ? `
        <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:1.8rem">${emoji}</div>
          <div style="font-size:0.7rem;color:var(--text-muted);margin:4px 0 6px;text-transform:uppercase;letter-spacing:.5px">${title}</div>
          <div style="font-size:1rem;font-weight:700;color:${color}">${esc(user.apelido||user.nome)}</div>
          <div style="font-size:0.78rem;color:var(--text-muted);margin-top:3px">${sub}</div>
        </div>` : '';
      html += `<div class="card">
        <div class="card-title">🏅 Rankings Alternativos</div>
        <div class="stats-alt-grid">
          ${mkAward('🎯','Melhor Sniper','var(--gold)',melhorSniper,`${melhorSniper?.exatos||0} placares exatos`)}
          ${mkAward('💀','Mais Zicado','#ff6b6b',maisZicado,`${maisZicado?.erros||0} erros`)}
          ${mkAward('🤝','Rei dos Empates','var(--accent)',reiEmpates,`${reiEmpates?.empates||0} palpites de empate`)}
          ${mkAward('🚀','Apostador Ousado','var(--orange)',apostadorOusado,`média ${apostadorOusado?.mediaGols?.toFixed(1)||0} gols/jogo`)}
        </div>
      </div>`;
    }

    // ── Precisão por usuário ──
    if (totalJogos > 0 && ranking.length > 0) {
      html += `<div class="card" style="padding:0;overflow:hidden">
        <div class="card-title" style="padding:16px 16px 0">🎯 Precisão dos Participantes</div>
        <div style="overflow-x:auto">
        <table class="ranking-table" style="margin-top:10px">
          <thead><tr>
            <th>Participante</th>
            <th title="% de acerto de resultado">Acerto%</th>
            <th title="% de placares exatos">Exato%</th>
            <th title="Erro médio em gols" class="hide-mobile">Δ Gols</th>
            <th title="Sequência atual de acertos">Sequência</th>
            <th title="Maior sequência histórica" class="hide-mobile">Recorde</th>
          </tr></thead><tbody>`;
      ranking.forEach(u => {
        const s = userAccStats[u.uid];
        if (!s) return;
        const streak = s.currentStreak > 0 ? `<span style="color:var(--green);font-weight:700">🔥 ${s.currentStreak}</span>` : `<span style="color:var(--text-muted)">—</span>`;
        html += `<tr ${u.uid===currentUser?.uid?'class="is-me"':''}>
          <td><div class="fw-bold">${esc(u.apelido)}</div><div style="font-size:0.72rem;color:var(--text-muted)">${esc(u.nome)}</div></td>
          <td style="font-weight:600;color:var(--gold)">${s.acertoPct}${s.acertoPct!=='-'?'%':''}</td>
          <td style="color:var(--green)">${s.exatoPct}${s.exatoPct!=='-'?'%':''}</td>
          <td class="hide-mobile" style="color:var(--text-muted)">${s.erroMedio}</td>
          <td>${streak}</td>
          <td class="hide-mobile" style="color:var(--accent)">${s.maxStreak > 0 ? s.maxStreak : '—'}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    }

    // ── Jogo mais difícil / mais fácil ──
    if (maisDificil || maisFacil) {
      html += `<div class="stats-pair">`;
      if (maisDificil) html += `<div class="card">
        <div class="card-title">😈 Mais Difícil</div>
        <div style="margin-top:10px">
          <div style="font-size:0.85rem;font-weight:600">${esc(maisDificil.game?.h||maisDificil.jid)} × ${esc(maisDificil.game?.a||'')}</div>
          <div style="font-size:1.4rem;font-weight:800;color:#ff6b6b;margin:4px 0">${maisDificil.pct.toFixed(0)}%</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${maisDificil.acertos}/${maisDificil.total} acertaram</div>
        </div>
      </div>`;
      if (maisFacil) html += `<div class="card">
        <div class="card-title">😊 Mais Fácil</div>
        <div style="margin-top:10px">
          <div style="font-size:0.85rem;font-weight:600">${esc(maisFacil.game?.h||maisFacil.jid)} × ${esc(maisFacil.game?.a||'')}</div>
          <div style="font-size:1.4rem;font-weight:800;color:var(--green);margin:4px 0">${maisFacil.pct.toFixed(0)}%</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">${maisFacil.acertos}/${maisFacil.total} acertaram</div>
        </div>
      </div>`;
      html += `</div>`;
    }

    // ── Cards originais ──
    html += `<div class="card">
        <div class="card-title">🏆 Jogo Mais Acertado (Placar Exato)</div>
        ${maiorAcerto.id ? `
          <div style="margin-top:12px">
            <p style="font-size:0.95rem;font-weight:600;margin-bottom:6px">${esc(analiseJogos[maiorAcerto.id].game?.h||'')} × ${esc(analiseJogos[maiorAcerto.id].game?.a||'')}</p>
            <p style="font-size:0.85rem;color:var(--text-muted)">
              ${analiseJogos[maiorAcerto.id].exatos} placares exatos ·
              ${analiseJogos[maiorAcerto.id].venc_saldo} vencedor+saldo ·
              ${analiseJogos[maiorAcerto.id].apenas_venc} apenas vencedor
            </p>
          </div>
        ` : '<p class="text-muted">Sem dados</p>'}
      </div>

      <div class="card">
        <div class="card-title">🔢 Placar Mais Palpitado</div>
        ${placarMaisComum ? `
          <p style="font-size:1.2rem;font-weight:700;color:var(--gold);margin-top:12px">${placarMaisComum[0]} <span style="font-size:0.85rem;color:var(--text-muted)">(${placarMaisComum[1]} palpites)</span></p>
        ` : '<p class="text-muted">Sem dados</p>'}
      </div>

      <div class="card">
        <div class="card-title">📊 Resultado Mais Comum</div>
        ${resultMaisComum ? `
          <p style="font-size:1.2rem;font-weight:700;color:var(--green);margin-top:12px">${resultMaisComum[0]} <span style="font-size:0.85rem;color:var(--text-muted)">(${resultMaisComum[1]} jogos)</span></p>
        ` : '<p class="text-muted">Sem dados</p>'}
      </div>`;

    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="alert alert-error">Erro: ${esc(errMsg(e))}</div>`;
  }
}

async function renderTabelas() {
  const cont = document.getElementById('tabelas-content');
  cont.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  try {
    const rSnap = await db_.collection('resultados').get();
    const res = {};

        const aPenTxt = hasPen ? ` <span style="color:var(--text-muted);font-size:0.72rem">(${r.a_pen})</span>` : '';
